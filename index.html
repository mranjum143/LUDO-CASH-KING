<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ludo Cash King</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
}
.logo {
  font-size: 45px;
  color: gold;
  animation: glow 1.5s infinite alternate;
}
.title {
  font-size: 22px;
  font-weight: bold;
  color: gold;
}
@keyframes glow {
  from { text-shadow: 0 0 10px gold; }
  to { text-shadow: 0 0 25px orange; }
}

/* PROFILE */
.profile {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  margin: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
}

/* GAME CARDS */
.card {
  margin: 12px;
  padding: 15px;
  border-radius: 15px;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* GAME BOX */
.game-box {
  background: linear-gradient(135deg, #141E30, #243B55);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}
.game-box:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00c6ff;
}

/* ICON */
.icon {
  font-size: 40px;
  margin-bottom: 10px;
}

/* BUTTON */
.play-btn {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
}

/* DAILY TASK */
.task {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  margin-top: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}

.collect {
  background: gold;
  color: black;
  border: none;
  padding: 5px 10px;
  border-radius: 10px;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}
.footer div {
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">👑</div>
  <div class="title">LUDO CASH KING</div>
</div>

<!-- PROFILE -->
<div class="profile">
  <div>
    Usman Ahmad<br>Level 12
  </div>
  <div>
    💰 PKR 2540<br>🪙 15680
  </div>
</div>

<!-- GAME SECTION -->
<div class="card">
  <h3>🎮 Play Game</h3>

  <div class="grid">

    <div class="game-box">
      <div class="icon">🎲</div>
      <div>Quick Match</div>
      <button class="play-btn" onclick="play('Quick Match')">Play</button>
    </div>

    <div class="game-box">
      <div class="icon">🎯</div>
      <div>Create Room</div>
      <button class="play-btn" onclick="play('Create Room')">Play</button>
    </div>

    <div class="game-box">
      <div class="icon">👥</div>
      <div>4 Player</div>
      <button class="play-btn" onclick="play('4 Player')">Play</button>
    </div>

    <div class="game-box">
      <div class="icon">🏆</div>
      <div>Tournament</div>
      <button class="play-btn" onclick="play('Tournament')">Play</button>
    </div>

  </div>
</div>

<!-- DAILY TASK -->
<div class="card">
  <h3>🎯 Daily Tasks</h3>

  <div class="task">
    <span>Play 1 Game</span>
    <button class="collect" onclick="reward()">+10</button>
  </div>

  <div class="task">
    <span>Win 1 Game</span>
    <button class="collect" onclick="reward()">+20</button>
  </div>

  <div class="task">
    <span>Watch Video</span>
    <button class="collect" onclick="reward()">+15</button>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div>🏠<br>Home</div>
  <div>👥<br>Friends</div>
  <div>💼<br>Wallet</div>
  <div>🛒<br>Store</div>
</div>

<script>
function play(mode){
  alert("Starting: " + mode);
}

function reward(){
  alert("Coins Added!");
}
</script>

</body>
</html>
