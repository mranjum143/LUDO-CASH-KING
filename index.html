<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ludo Cash King</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0c29;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: white;
  padding-bottom: 70px; /* Space for footer */
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.3);
}

.logo {
  font-size: 50px;
  filter: drop-shadow(0 0 10px gold);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.title {
  font-size: 24px;
  font-weight: bold;
  color: #FFD700;
  letter-spacing: 2px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

/* Profile Section */
.profile {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  margin: 15px;
  border-radius: 15px;
  border: 1px solid rgba(255,215,0,0.3);
}

.coin-box {
  background: rgba(0,0,0,0.5);
  padding: 5px 12px;
  border-radius: 20px;
  font-weight: bold;
  color: #FFD700;
  margin-bottom: 5px;
}

/* Cards */
.card {
  margin: 15px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
}

.card h3 {
  margin-top: 0;
  font-size: 18px;
  color: #00c6ff;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 10px;
}

/* Professional Buttons */
.btn {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border: none;
  border-radius: 15px;
  font-size: 17px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s;
}

.btn:active { transform: scale(0.95); }

.btn1 { background: linear-gradient(45deg, #00c6ff, #0072ff); box-shadow: 0 4px 15px rgba(0,114,255,0.4); }
.btn2 { background: linear-gradient(45deg, #7b1fa2, #512da8); box-shadow: 0 4px 15px rgba(81,45,168,0.4); }
.btn3 { background: linear-gradient(45deg, #ff416c, #ff4b2b); box-shadow: 0 4px 15px rgba(255,75,43,0.4); }
.btn4 { background: linear-gradient(45deg, #11998e, #38ef7d); box-shadow: 0 4px 15px rgba(56,239,125,0.4); }

/* Task Styling */
.task {
  background: rgba(0,0,0,0.3);
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.collect {
  background: #FFD700;
  color: black;
  border: none;
  padding: 6px 15px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* Footer Navigation */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #050510;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid rgba(255,215,0,0.2);
}

.footer-item {
  text-align: center;
  color: #888;
  font-size: 12px;
  transition: 0.3s;
}

.footer-item.active { color: #FFD700; }
.footer-item i { font-size: 20px; display: block; margin-bottom: 2px; }

</style>
</head>

<body>

<div class="header">
  <div class="logo">👑</div>
  <div class="title">LUDO CASH KING</div>
</div>

<div class="profile">
  <div>
    <span style="font-size: 20px; font-weight: bold;">Usman Ahmad</span><br>
    <span style="color: #00c6ff;">Level 12</span>
  </div>
  <div style="text-align: right;">
    <div class="coin-box"><i class="fas fa-wallet"></i> PKR 2,540</div>
    <div class="coin-box" style="color: #00FF95;"><i class="fas fa-coins"></i> 15,680</div>
  </div>
</div>

<div class="card">
  <h3><i class="fas fa-play-circle"></i> Play Game</h3>
  <button class="btn btn1" onclick="play('Quick Match')">Quick Match <i class="fas fa-bolt"></i></button>
  <button class="btn btn2" onclick="play('Create Room')">Create Room <i class="fas fa-plus-circle"></i></button>
  <button class="btn btn3" onclick="play('4 Player Battle')">4 Player Battle <i class="fas fa-users"></i></button>
  <button class="btn btn4" onclick="play('Tournament')">Tournament <i class="fas fa-trophy"></i></button>
</div>

<div class="card">
  <h3><i class="fas fa-tasks"></i> Daily Tasks</h3>

  <div class="task">
    <span><i class="fas fa-gamepad text-blue-400"></i> Play 1 Game</span>
    <button class="collect" onclick="reward()">+10</button>
  </div>

  <div class="task">
    <span><i class="fas fa-crown text-yellow-500"></i> Win 1 Game</span>
    <button class="collect" onclick="reward()">+20</button>
  </div>
</div>

<div class="footer">
  <div class="footer-item active"><i class="fas fa-home"></i>Home</div>
  <div class="footer-item"><i class="fas fa-user-friends"></i>Friends</div>
  <div class="footer-item"><i class="fas fa-wallet"></i>Wallet</div>
  <div class="footer-item"><i class="fas fa-store"></i>Store</div>
</div>

<script>
function play(mode){
  alert("Starting " + mode + "...");
}

function reward(){
  alert("Congratulations! Coins Added to your wallet.");
}
</script>

</body>
</html>
