<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Cash King - Ultra Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif;
            background: #050505; color: white;
            overflow: hidden; direction: rtl;
        }

        /* اینیمیٹڈ بیک گراؤنڈ */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e1e3f 0%, #050505 100%);
            z-index: -1;
        }

        /* اوپر والی اسٹیٹس بار */
        .status-bar {
            height: 25px; background: rgba(0,0,0,0.3);
            display: flex; justify-content: space-between;
            padding: 0 15px; font-size: 10px; align-items: center;
            color: rgba(255,255,255,0.6);
        }

        /* ہیڈر اور تاج */
        header { padding: 20px 0; text-align: center; }
        .crown-wrapper { position: relative; display: inline-block; }
        .fa-crown {
            font-size: 30px; color: #ffd700;
            position: absolute; top: -25px; left: 50%;
            transform: translateX(-50%); filter: drop-shadow(0 0 10px #ffd700);
            animation: bounce 2s infinite alternate;
        }
        @keyframes bounce { to { transform: translateX(-50%) translateY(-5px); } }
        
        .main-title {
            font-size: 24px; font-weight: 900;
            background: linear-gradient(to bottom, #fff, #ffd700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* کارڈز گرڈ */
        .game-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; padding: 15px; perspective: 1000px;
        }

        .pro-card {
            height: 100px; border-radius: 12px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 1px solid rgba(255,215,0,0.1);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; position: relative;
            transition: all 0.2s; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .pro-card:active { transform: scale(0.9) rotateX(10deg); }

        .pro-card::before {
            content: ''; position: absolute; inset: 0; border-radius: 12px;
            padding: 2px; background: linear-gradient(45deg, transparent, rgba(255,215,0,0.3), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
        }

        .icon-glow {
            font-size: 35px; margin-bottom: 5px;
            filter: drop-shadow(0 0 10px currentColor);
        }

        .label { font-size: 13px; font-weight: 600; color: #eee; }

        /* نیویگیشن بار */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(10,10,10,0.95);
            display: flex; justify-content: space-around;
            padding: 10px 0; border-top: 1px solid #333;
            backdrop-filter: blur(10px);
        }

        .nav-btn { color: #666; font-size: 20px; transition: 0.3s; }
        .nav-btn.active { color: #ffd700; transform: translateY(-5px); }
        .nav-btn span { display: block; font-size: 9px; margin-top: 3px; }

    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="status-bar">
        <div>15:26 <i class="fas fa-wifi"></i></div>
        <div><i class="fas fa-battery-three-quarters"></i> 85%</div>
    </div>

    <header>
        <div class="crown-wrapper">
            <i class="fas fa-crown"></i>
            <div class="main-title">LUDO CASH KING</div>
            <div style="font-size: 10px; color: #ffd700; letter-spacing: 2px;">PRO GAMING PLATFORM</div>
        </div>
    </header>

    <div class="game-grid">
        <div class="pro-card" onclick="playSound()">
            <i class="fas fa-globe icon-glow" style="color: #4ade80;"></i>
            <span class="label">آن لائن مقابلہ</span>
        </div>
        <div class="pro-card" onclick="playSound()">
            <i class="fas fa-user-friends icon-glow" style="color: #3b82f6;"></i>
            <span class="label">دوستوں کا کمرہ</span>
        </div>
        <div class="pro-card" onclick="playSound()">
            <i class="fas fa-couch icon-glow" style="color: #f87171;"></i>
            <span class="label">آف لائن کھیل</span>
        </div>
        <div class="pro-card" onclick="playSound()">
            <i class="fas fa-robot icon-glow" style="color: #fbbf24;"></i>
            <span class="label">کمپیوٹر</span>
        </div>
        <div class="pro-card" style="grid-column: span 2; height: 80px;" onclick="playSound()">
            <i class="fas fa-trophy icon-glow" style="color: #ffd700;"></i>
            <span class="label">گرینڈ ٹورنامنٹ</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-btn active"><i class="fas fa-home"></i><span>ہوم</span></div>
        <div class="nav-btn"><i class="fas fa-wallet"></i><span>والٹ</span></div>
        <div class="nav-btn"><i class="fas fa-award"></i><span>رینک</span></div>
        <div class="nav-btn"><i class="fas fa-user"></i><span>پروفائل</span></div>
    </nav>

    <script>
        function playSound() {
            let audio = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
            audio.volume = 0.5;
            audio.play();
        }
    </script>

</body>
</html>
