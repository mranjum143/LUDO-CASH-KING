<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ludo Cash King | Gaming Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  :root {
    --gold: linear-gradient(180deg, #FFD700 0%, #B8860B 100%);
    --blue: linear-gradient(180deg, #00d2ff 0%, #3a7bd5 100%);
    --purple: linear-gradient(180deg, #9d50bb 0%, #6e48aa 100%);
    --red: linear-gradient(180deg, #ff4b2b 0%, #ff416c 100%);
    --green: linear-gradient(180deg, #11998e 0%, #38ef7d 100%);
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0b0e21; /* Dark Gaming Theme */
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    direction: ltr;
  }

  /* Top Bar like Ludo Star */
  .top-bar {
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: space-between;
    padding: 10px 15px;
    align-items: center;
    border-bottom: 2px solid #FFD700;
  }

  .currency-box {
    background: #000;
    border: 1.5px solid #FFD700;
    border-radius: 20px;
    padding: 2px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: bold;
    font-size: 14px;
    min-width: 90px;
  }

  /* Main Menu Buttons Grid */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 20px;
    flex-grow: 1;
    align-content: center;
  }

  /* The 3D Gaming Button style from your images */
  .game-btn {
    aspect-ratio: 1/1;
    border: none;
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 0px rgba(0,0,0,0.4);
    transition: 0.1s;
  }

  .game-btn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0px rgba(0,0,0,0.4);
  }

  .btn-icon {
    font-size: 50px;
    margin-bottom: 10px;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
  }

  .btn-label {
    font-weight: 900;
    font-size: 16px;
    text-transform: uppercase;
    text-shadow: 1px 2px 3px rgba(0,0,0,0.5);
  }

  /* Specific Button Colors */
  .online { background: var(--green); border: 3px solid #1ef09c; }
  .friends { background: var(--purple); border: 3px solid #c078f1; }
  .computer { background: var(--blue); border: 3px solid #71d9ff; }
  .local { background: var(--red); border: 3px solid #ff7e67; }

  /* Bottom Navigation */
  .bottom-nav {
    background: linear-gradient(0deg, #000 0%, #1a1a2e 100%);
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    border-top: 2px solid #FFD700;
  }

  .nav-item {
    text-align: center;
    font-size: 12px;
    color: #aaa;
  }

  .nav-item.active { color: #FFD700; }
  .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }

  /* Center Logo Area */
  .logo-area {
    text-align: center;
    padding: 10px;
  }
  .logo-area h1 {
    margin: 0;
    font-size: 28px;
    color: gold;
    text-shadow: 0 0 10px gold;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div style="display: flex; align-items: center; gap: 10px;">
    <div style="width: 45px; height: 45px; border: 2px solid gold; border-radius: 10px; overflow: hidden;">
      <img src="https://ui-avatars.com/api/?name=Ahmad&background=FFD700" width="100%">
    </div>
    <div style="font-size: 12px;"><b>Usman Ahmad</b><br>Lv. 12</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 5px;">
    <div class="currency-box">🪙 <span style="color: gold;">15,680</span></div>
    <div class="currency-box">💎 <span style="color: #00d2ff;">1,250</span></div>
  </div>
</div>

<div class="logo-area">
  <h1>LUDO CASH KING</h1>
</div>

<div class="menu-grid">
  
  <button class="game-btn online" onclick="alert('Online Mode')">
    <div class="btn-icon">🌍</div>
    <div class="btn-label">Online</div>
  </button>

  <button class="game-btn friends" onclick="alert('Friends Mode')">
    <div class="btn-icon">👨‍👩‍👦</div>
    <div class="btn-label">Friends</div>
  </button>

  <button class="game-btn computer" onclick="alert('Computer Mode')">
    <div class="btn-icon">📱</div>
    <div class="btn-label">Computer</div>
  </button>

  <button class="game-btn local" onclick="alert('Local Mode')">
    <div class="btn-icon">🏠</div>
    <div class="btn-label">Local</div>
  </button>

</div>

<div class="bottom-nav">
  <div class="nav-item active"><i class="fas fa-home"></i>Home</div>
  <div class="nav-item"><i class="fas fa-trophy"></i>Leagues</div>
  <div class="nav-item"><i class="fas fa-wallet"></i>Shop</div>
  <div class="nav-item"><i class="fas fa-cog"></i>Settings</div>
</div>

</body>
</html>
