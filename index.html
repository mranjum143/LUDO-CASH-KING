<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Cash King - Professional 4D</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* کارڈز کے گہرے رنگ */
            --bg-online: #27ae60;
            --bg-friends: #2980b9;
            --bg-offline: #c0392b;
            --bg-comp: #f39c12;
            --bg-tourney: #8e44ad;
            --gold-gradient: linear-gradient(180deg, #FFD700 0%, #B8860B 100%);
        }

        body {
            margin: 0;
            padding: 0;
            /* مکمل رنگین اور متحرک بیک گراؤنڈ */
            background: linear-gradient(-45deg, #1a0b2e, #2d1b4d, #1e1e3f, #0f0f1a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Arial', sans-serif;
            direction: rtl;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* شاہی ہیڈر اور تاج */
        header {
            text-align: center;
            padding: 20px 10px;
            position: relative;
        }

        .crown-container {
            position: relative;
            display: inline-block;
        }

        .fa-crown {
            font-size: 40px;
            color: #FFD700;
            filter: drop-shadow(0 0 15px gold);
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%) rotate(-5deg);
            animation: crownFloat 2s infinite alternate;
        }

        @keyframes crownFloat {
            from { transform: translateX(-50%) translateY(0) rotate(-5deg); }
            to { transform: translateX(-50%) translateY(-10px) rotate(5deg); }
        }

        .main-logo {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 35px;
            font-weight: 900;
            margin-top: 10px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
            letter-spacing: 2px;
        }

        /* کارڈز کا گرڈ - چھوٹا اور پروفیشنل */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* دو لائنوں میں چھوٹے ڈبے */
            gap: 15px;
            padding: 10px 20px;
            flex-grow: 1;
        }

        .game-card {
            border-radius: 15px;
            height: 130px; /* سائز چھوٹا کر دیا گیا */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.3);
            transition: 0.3s;
            cursor: pointer;
        }

        .game-card:active { transform: scale(0.95); }

        /* انفرادی رنگ */
        .online { background: var(--bg-online); }
        .friends { background: var(--bg-friends); }
        .offline { background: var(--bg-offline); }
        .computer { background: var(--bg-comp); }
        .tourney { background: var(--bg-tourney); grid-column: span 2; height: 100px; } /* ٹورنامنٹ بڑا کارڈ */

        .card-icon {
            font-size: 45px; /* بڑا لوگو */
            color: white;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            margin-bottom: 5px;
        }

        .card-text {
            font-weight: bold;
            font-size: 16px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        /* 4D گوٹی کا سایہ */
        .small-pawn {
            width: 25px;
            height: 25px;
            background: radial-gradient(circle at 30% 30%, #fff, transparent);
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            right: 10px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.6);
            opacity: 0.7;
        }

        /* نیویگیشن بار */
        .bottom-nav {
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 2px solid gold;
            border-radius: 20px 20px 0 0;
        }

        .nav-item {
            color: #bdc3c7;
            text-align: center;
            font-size: 20px;
            transition: 0.3s;
        }

        .nav-item.active { color: gold; transform: translateY(-5px); }

    </style>
</head>
<body>

    <header>
        <div class="crown-container">
            <i class="fas fa-crown"></i>
            <div class="main-logo">LUDO CASH KING</div>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="game-card online">
            <i class="fas fa-globe card-icon"></i>
            <span class="card-text">آن لائن</span>
            <div class="small-pawn"></div>
        </div>

        <div class="game-card friends">
            <i class="fas fa-users card-icon"></i>
            <span class="card-text">دوست</span>
            <div class="small-pawn"></div>
        </div>

        <div class="game-card offline">
            <i class="fas fa-couch card-icon"></i>
            <span class="card-text">آف لائن</span>
            <div class="small-pawn"></div>
        </div>

        <div class="game-card computer">
            <i class="fas fa-robot card-icon"></i>
            <span class="card-text">کمپیوٹر</span>
            <div class="small-pawn"></div>
        </div>

        <div class="game-card tourney">
            <i class="fas fa-trophy card-icon"></i>
            <span class="card-text">بڑا ٹورنامنٹ</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i><div style="font-size: 10px;">ہوم</div></div>
        <div class="nav-item"><i class="fas fa-wallet"></i><div style="font-size: 10px;">والٹ</div></div>
        <div class="nav-item"><i class="fas fa-history"></i><div style="font-size: 10px;">ہسٹری</div></div>
        <div class="nav-item"><i class="fas fa-cog"></i><div style="font-size: 10px;">سیٹنگ</div></div>
    </nav>

    <script>
        // ساؤنڈ پلے کرنے کا فنکشن (پہلے کلک پر)
        document.body.addEventListener('click', function() {
            let audio = new Audio('https://www.soundjay.com/misc/sounds/magic-chime-01.mp3');
            audio.play();
        }, { once: true });
    </script>
</body>
</html>
