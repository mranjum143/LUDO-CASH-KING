<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Cash King | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle, #1a1a3a 0%, #050510 100%); font-family: 'Segoe UI', sans-serif; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .gold-glow { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); border: 1px solid #FFD700; }
        .dice-btn { transition: transform 0.2s; }
        .dice-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-6xl font-black text-yellow-400 mb-2 tracking-tighter">
                <i class="fas fa-crown"></i> LUDO CASH KING
            </h1>
            <p class="text-blue-400 font-bold uppercase tracking-widest text-sm">ماسٹر کنٹرول پینل</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="glass-card gold-glow p-6 text-center">
                <div class="bg-yellow-400 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-wallet text-2xl text-black"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">پیمنٹ سیٹنگز</h3>
                <p class="text-gray-400 text-sm mb-4">JazzCash: Sidra Sahzadi</p>
                <div class="text-2xl font-mono text-green-400">03061424135</div>
            </div>

            <div class="glass-card p-6 text-center border-blue-500 border">
                <div class="text-blue-500 text-4xl mb-2"><i class="fas fa-users"></i></div>
                <h3 class="text-lg">کل کھلاڑی</h3>
                <div class="text-3xl font-bold">1,240</div>
            </div>

            <div class="glass-card p-6 text-center border-purple-500 border">
                <div class="text-purple-500 text-4xl mb-2"><i class="fas fa-coins"></i></div>
                <h3 class="text-lg">آج کی کمائی</h3>
                <div class="text-3xl font-bold">RS 15,500</div>
            </div>
        </div>

        <div class="glass-card mt-10 overflow-hidden">
            <div class="bg-white/5 p-4 border-b border-white/10 flex justify-between items-center">
                <h3 class="font-bold"><i class="fas fa-gamepad mr-2 text-yellow-400"></i> لائیو پلیئرز</h3>
                <span class="bg-green-500 text-xs px-2 py-1 rounded-full animate-pulse">LIVE</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="text-gray-400 text-sm uppercase">
                            <th class="p-4">پلیئر</th>
                            <th class="p-4">بیلنس</th>
                            <th class="p-4 text-center">ڈائس کنٹرول</th>
                            <th class="p-4 text-center">ایکشن</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-t border-white/5 hover:bg-white/5">
                            <td class="p-4">
                                <div class="font-bold">Usman Ahmad</div>
                                <div class="text-xs text-gray-500">+923270394662</div>
                            </td>
                            <td class="p-4 text-green-400 font-bold">RS 2,540</td>
                            <td class="p-4">
                                <div class="flex justify-center gap-2">
                                    <button onclick="setDice(6)" class="dice-btn bg-purple-600 px-3 py-1 rounded-md text-xs font-bold hover:bg-purple-500">6 لائیں</button>
                                    <button onclick="setDice(1)" class="dice-btn bg-red-600 px-3 py-1 rounded-md text-xs font-bold hover:bg-red-500">1 لائیں</button>
                                </div>
                            </td>
                            <td class="p-4 text-center">
                                <button class="bg-green-500 text-black px-4 py-1 rounded-full text-xs font-bold">پیسے ایڈ کریں</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function setDice(n) {
            alert("اگلی باری پر " + n + " آئے گا! کنٹرول ایکٹیویٹ ہو گیا ہے۔");
        }
    </script>
</body>
</html>
