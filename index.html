<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Cash King - Ultra 4D Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --gold: linear-gradient(45deg, #f39c12, #f1c40f, #f39c12);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #000; /* بیس کلر کالا */
            color: white;
            direction: rtl;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* رنگ برنگا اینیمیٹڈ بیک گراؤنڈ */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, #2c3e50, #000000, #2980b9, #000000, #8e44ad);
            background-size: 400% 400%;
            animation: aurora 10s ease infinite;
            z-index: -1;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ہیڈر ڈیزائن */
        header {
            padding: 30px 10px 10px;
            text-align: center;
        }

        .crown-box {
            position: relative;
            display: inline-block;
        }

        .fa-crown {
            font-size: 35px;
            color: gold;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 0 10px gold);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.7; transform: translateX(-50%) scale(1.1); }
        }

        .title {
            font-size: 28px;
            font-weight: 900;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* کارڈز گرڈ */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
            flex: 1;
        }

        /* پروفیشنل چھوٹے کارڈز */
        .pro-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .pro-card:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        /* کارڈ کے اندر رنگ برنگے سائے (Glow) */
        .pro-card::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            filter: blur(30px);
            z-index: -1;
            opacity: 0.5;
        }

        .online::after { background: #00ff88; }
        .friends::after { background: #00d2ff; }
        .offline::after { background: #ff416c; }
        .comp::after { background: #ffb347; }

        .pro-icon {
            font-size: 38px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 8px currentColor);
        }

        .pro-label {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ٹورنامنٹ کارڈ (تھوڑا چوڑا) */
        .tourney-wide {
            grid-column: span 2;
            height: 80px;
            background: linear-gradient(90deg, rgba(142,68,173,0.3), rgba(41,128,185,0.3));
        }

        /* پروفیشنل نیویگیشن */
        .nav-bar {
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid rgba(255,215,0,0.3);
            backdrop-filter: blur(15px);
        }

        .nav-link {
            text-align: center;
            color: #888;
            font-size: 18px;
            transition: 0.3s;
        }

        .nav-link.active {
            color: gold;
            transform: translateY(-3px);
            text-shadow: 0 0 10px gold;
        }

        .nav-label {
            font-size: 10px;
            display: block;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="crown-box">
            <i class="fas fa-crown"></i>
            <div class="title">Ludo Cash King</div>
        </div>
    </header>

    <div class="grid-container">
        <div class="pro-card online">
            <i class="fas fa-globe-americas pro-icon" style="color: #00ff88;"></i>
            <span class="pro-label">آن لائن پلے</span>
        </div>

        <div class="pro-card friends">
            <i class="fas fa-user-friends pro-icon" style="color: #00d2ff;"></i>
            <span class="pro-label">دوستوں کا ٹیبل</span>
        </div>

        <div class="pro-card offline">
            <i class="fas fa-couch pro-icon" style="color: #ff416c;"></i>
            <span class="pro-label">آف لائن</span>
        </div>

        <div class="pro-card comp">
            <i class="fas fa-microchip pro-icon" style="color: #ffb347;"></i>
            <span class="pro-label">کمپیوٹر</span>
        </div>

        <div class="pro-card tourney-wide">
            <i class="fas fa-award pro-icon" style="color: gold;"></i>
            <span class="pro-label">لکی ٹورنامنٹ</span>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-link active">
            <i class="fas fa-th-large"></i>
            <span class="nav-label">ہوم</span>
        </div>
        <div class="nav-link">
            <i class="fas fa-wallet"></i>
            <span class="nav-label">والٹ</span>
        </div>
        <div class="nav-link">
            <i class="fas fa-chart-line"></i>
            <span class="nav-label">ہسٹری</span>
        </div>
        <div class="nav-link">
            <i class="fas fa-user-cog"></i>
            <span class="nav-label">پروفائل</span>
        </div>
    </nav>

    <script>
        // پروفیشنل ساؤنڈ اثر
        document.body.addEventListener('click', function() {
            let audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
            audio.volume = 0.3;
            audio.play();
        }, { once: true });
    </script>
</body>
</html>
