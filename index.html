<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Ludo - Premium 4D</title>
    <style>
        /* پریمیم 4D بٹن کا ڈیزائن */
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 50px;
            background: #1a0b2e;
        }

        .ludo-card {
            width: 150px;
            height: 180px;
            background: linear-gradient(180deg, #4ade80 0%, #15803d 100%);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 15px 0 #052e16, 0 25px 50px rgba(0,0,0,0.5); /* 4D Depth */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
        }

        .ludo-card:active {
            transform: translateY(10px);
            box-shadow: 0 5px 0 #052e16;
        }

        /* اصلی گوٹی کا ڈیزائن (Using Image for Realism) */
        .goti-image {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .label {
            color: white;
            font-weight: 900;
            margin-top: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="btn-container">
        <div class="ludo-card">
            <img src="https://img.icons8.com/color/144/board-game.png" class="goti-image" alt="4D Goti">
            <div class="label">2 PLAYER</div>
        </div>

        <div class="ludo-card" style="background: linear-gradient(180deg, #f87171 0%, #991b1b 100%); box-shadow: 0 15px 0 #450a0a;">
            <img src="https://img.icons8.com/color/144/ludo.png" class="goti-image" alt="4D Goti">
            <div class="label">4 PLAYER</div>
        </div>
    </div>

</body>
</html>
