<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Cash King | Ahmad Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600;800&display=swap');

        :root {
            --gold: #FFD700;
            --gold-shadow: rgba(255, 215, 0, 0.4);
            --bg-deep: #050510;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-deep);
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            direction: ltr;
        }

        /* Main Container */
        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), linear-gradient(180deg, #0a0a20 0%, #050510 100%);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            padding-bottom: 80px;
        }

        /* Header & Animated Crown */
        .header {
            text-align: center;
            padding: 30px 0 10px;
        }

        .crown-box {
            font-size: 60px;
            color: var(--gold);
            filter: drop-shadow(0 0 15px var(--gold));
            animation: crownFloat 2.5s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes crownFloat {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); scale: 1.1; }
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(to bottom, #FFF7AD 0%, #FFAA00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            margin: 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #000;
            padding: 5px 12px;
            border-radius: 15px;
            border-bottom: 2px solid var(--gold);
        }

        /* 3D Game Buttons */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .ludo-btn {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 25px 10px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .ludo-btn:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .ludo-btn:active {
            transform: translateY(2px);
        }

        .ludo-btn i {
            font-size: 45px;
            margin-bottom: 15px;
            display: block;
            transition: 0.3s;
        }

        .ludo-btn:hover i {
            transform: scale(1.2) rotate(10deg);
        }

        .btn-label {
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* Specific Colors for Buttons */
        .btn-online { background: linear-gradient(145deg, #1d4ed8, #1e40af); border-bottom: 5px solid #172554; }
        .btn-friends { background: linear-gradient(145deg, #7e22ce, #581c87); border-bottom: 5px solid #2e1065; }
        .btn-comp { background: linear-gradient(145deg, #15803d, #166534); border-bottom: 5px solid #052e16; }
        .btn-local { background: linear-gradient(145deg, #b91c1c, #991b1b); border-bottom: 5px solid #450a0a; }

        /* Animated Wheel/Task Section */
        .reward-section {
            background: rgba(255,215,0,0.1);
            margin: 20px;
            padding: 20px;
            border-radius: 25px;
            border: 2px dashed var(--gold);
            text-align: center;
            animation: pulseBg 2s infinite;
        }

        @keyframes pulseBg {
            0%, 100% { border-color: var(--gold); }
            50% { border-color: #fff; }
        }

        /* Professional Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 3px solid var(--gold);
            border-radius: 25px 25px 0 0;
            z-index: 100;
        }

        .nav-item {
            color: #666;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--gold);
            transform: translateY(-5px);
        }

        .nav-item i {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        /* Ahmad's Signature Badge */
        .signature {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <div class="crown-box"><i class="fas fa-crown"></i></div>
            <div class="main-title">LUDO CASH KING</div>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <i class="fas fa-user-circle" style="color: #00d2ff;"></i>
                <span style="font-size: 12px;">Ahmad Nafees</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-coins" style="color: gold;"></i>
                <span>25,400</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-gem" style="color: #ff00ff;"></i>
                <span>1,500</span>
            </div>
        </div>

        <div class="game-grid">
            <div class="ludo-btn btn-online" onclick="playEffect()">
                <i class="fas fa-globe-americas"></i>
                <span class="btn-label">Online Battle</span>
            </div>

            <div class="ludo-btn btn-friends" onclick="playEffect()">
                <i class="fas fa-users-viewfinder"></i>
                <span class="btn-label">Private Room</span>
            </div>

            <div class="ludo-btn btn-comp" onclick="playEffect()">
                <i class="fas fa-robot"></i>
                <span class="btn-label">VS Computer</span>
            </div>

            <div class="ludo-btn btn-local" onclick="playEffect()">
                <i class="fas fa-couch"></i>
                <span class="btn-label">Local Play</span>
            </div>
        </div>

        <div class="reward-section">
            <i class="fas fa-dharmachakra fa-spin fa-3x" style="color: gold; margin-bottom: 10px;"></i>
            <h3 style="margin: 0; font-size: 18px;">Lucky Spin</h3>
            <p style="font-size: 11px; color: #ccc;">Win up to 10,000 Coins Daily!</p>
            <button style="background: gold; border: none; padding: 8px 25px; border-radius: 20px; font-weight: bold; margin-top: 10px; cursor: pointer;">SPIN NOW</button>
        </div>

        <div class="signature">
            Designed for Ahmad Nafees Anjum
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><i class="fas fa-home"></i>Home</div>
            <div class="nav-item"><i class="fas fa-comment-dots"></i>Chat</div>
            <div class="nav-item"><i class="fas fa-wallet"></i>Wallet</div>
            <div class="nav-item"><i class="fas fa-shop"></i>Store</div>
            <div class="nav-item"><i class="fas fa-user"></i>Profile</div>
        </div>

    </div>

    <script>
        function playEffect() {
            // Button Click Vibration or Sound logic can be added here
            console.log("Button Pressed!");
        }

        // Animated entry for cards
        document.querySelectorAll('.ludo-btn').forEach((btn, index) => {
            btn.style.opacity = '0';
            btn.style.transform = 'translateY(20px)';
            setTimeout(() => {
                btn.style.transition = '0.5s all ease';
                btn.style.opacity = '1';
                btn.style.transform = 'translateY(0)';
            }, index * 100);
        });
    </script>

</body>
</html>
