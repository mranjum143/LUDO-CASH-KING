<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ludo Cash King</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 15px;
}

.logo {
  font-size: 40px;
  color: gold;
}

.title {
  font-size: 22px;
  font-weight: bold;
  color: gold;
}

/* Profile */
.profile {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  margin: 10px;
  border-radius: 10px;
}

/* Cards */
.card {
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* Buttons */
.btn {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  color: white;
  cursor: pointer;
}

.btn1 { background: linear-gradient(45deg, #00c6ff, #0072ff); }
.btn2 { background: linear-gradient(45deg, #7b1fa2, #512da8); }
.btn3 { background: linear-gradient(45deg, #ff416c, #ff4b2b); }
.btn4 { background: linear-gradient(45deg, #11998e, #38ef7d); }

/* Daily Tasks */
.task {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

.collect {
  background: gold;
  color: black;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
}

/* Footer */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.footer div {
  color: white;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="logo">👑</div>
  <div class="title">LUDO CASH KING</div>
</div>

<!-- Profile -->
<div class="profile">
  <div>Usman Ahmad<br>Level 12</div>
  <div>💰 PKR 2540<br>🪙 15680</div>
</div>

<!-- Game Modes -->
<div class="card">
  <h3>🎮 Play Game</h3>
  <button class="btn btn1" onclick="play('Quick Match')">Quick Match</button>
  <button class="btn btn2" onclick="play('Create Room')">Create Room</button>
  <button class="btn btn3" onclick="play('4 Player Battle')">4 Player Battle</button>
  <button class="btn btn4" onclick="play('Tournament')">Tournament</button>
</div>

<!-- Daily Tasks -->
<div class="card">
  <h3>🎯 Daily Tasks</h3>

  <div class="task">
    <span>Play 1 Game</span>
    <button class="collect" onclick="reward()">+10</button>
  </div>

  <div class="task">
    <span>Win 1 Game</span>
    <button class="collect" onclick="reward()">+20</button>
  </div>

  <div class="task">
    <span>Watch Video</span>
    <button class="collect" onclick="reward()">+15</button>
  </div>

</div>

<!-- Footer -->
<div class="footer">
  <div>🏠 Home</div>
  <div>👥 Friends</div>
  <div>💼 Wallet</div>
  <div>🛒 Store</div>
</div>

<script>
function play(mode){
  alert("Starting: " + mode);
}

function reward(){
  alert("Coins Added!");
}
</script>

</body>
</html>
