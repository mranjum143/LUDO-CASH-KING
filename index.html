<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<title>Ludo Cash King | Ultimate Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --gold-grad: linear-gradient(180deg, #FFD700 0%, #B8860B 100%);
    --bg-dark: #050510;
  }

  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-dark);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    direction: ltr; /* UI icons/labels logic */
  }

  /* Animated Crown Logo */
  .logo-section {
    text-align: center;
    padding: 15px 0;
  }

  .crown-icon {
    font-size: 45px;
    color: #FFD700;
    filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.7));
    margin-bottom: -10px;
    animation: float 2s infinite ease-in-out;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .app-name {
    font-size: 26px;
    font-weight: 900;
    background: var(--gold-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0px 4px 10px rgba(0,0,0,0.5);
  }

  /* Top Stats Bar */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(255,255,255,0.05);
  }

  .stat-item {
    background: #000;
    border: 1px solid #FFD700;
    border-radius: 50px;
    padding: 4px 15px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: bold;
    box-shadow: inset 0 0 10px rgba(255,215,0,0.2);
  }

  /* Main Grid Layout */
  .game-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 25px;
    flex-grow: 1;
  }

  .mode-card {
    background: rgba(255,255,255,0.03);
    border-radius: 25px;
    border: 2px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition: 0.2s;
    cursor: pointer;
  }

  .mode-card:active { transform: scale(0.95); }

  /* Shiny 3D Icons Style */
  .icon-wrapper {
    font-size: 55px;
    margin-bottom: 15px;
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
  }

  .card-label {
    font-weight: bold;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Color Themes per Button */
  .c-online { background: linear-gradient(135deg, #2ecc71, #27ae60); border-color: #2ecc71; }
  .c-friends { background: linear-gradient(135deg, #9b59b6, #8e44ad); border-color: #9b59b6; }
  .c-comp { background: linear-gradient(135deg, #3498db, #2980b9); border-color: #3498db; }
  .c-local { background: linear-gradient(135deg, #e74c3c, #c0392b); border-color: #e74c3c; }

  /* Professional Bottom Navigation */
  .navbar {
    background: #000;
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    border-top: 2px solid #B8860B;
  }

  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #666;
    font-size: 11px;
    font-weight: bold;
    text-decoration: none;
  }

  .nav-btn.active {
    color: #FFD700;
  }

  .nav-btn i {
    font-size: 22px;
    margin-bottom: 4px;
  }

</style>
</head>
<body>

  <div class="logo-section">
    <div class="crown-icon"><i class="fas fa-crown"></i></div>
    <div class="app-name">LUDO CASH KING</div>
  </div>

  <div class="stats-bar">
    <div class="stat-item" style="color: gold;">
      <i class="fas fa-coins"></i> 25,400
    </div>
    <div class="stat-item" style="color: #00d2ff;">
      <i class="fas fa-gem"></i> 1,500
    </div>
  </div>

  <div class="game-grid">
    
    <div class="mode-card c-online">
      <div class="icon-wrapper">🌍</div>
      <div class="card-label">Online</div>
    </div>

    <div class="mode-card c-friends">
      <div class="icon-wrapper">👪</div>
      <div class="card-label">Friends</div>
    </div>

    <div class="mode-card c-comp">
      <div class="icon-wrapper">🤖</div>
      <div class="card-label">Computer</div>
    </div>

    <div class="mode-card c-local">
      <div class="icon-wrapper">🏟️</div>
      <div class="card-label">Local</div>
    </div>

  </div>

  <nav class="navbar">
    <a href="#" class="nav-btn active">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="#" class="nav-btn">
      <i class="fas fa-users"></i>
      <span>Social</span>
    </a>
    <a href="#" class="nav-btn">
      <i class="fas fa-wallet"></i>
      <span>Wallet</span>
    </a>
    <a href="#" class="nav-btn">
      <i class="fas fa-shopping-cart"></i>
      <span>Shop</span>
    </a>
    <a href="#" class="nav-btn">
      <i class="fas fa-user-circle"></i>
      <span>Profile</span>
    </a>
  </nav>

</body>
</html>
